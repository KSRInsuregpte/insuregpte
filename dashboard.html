<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
        <h1 id="welcome" class="text-2xl font-bold">Welcome!</h1>
        <button onclick="logout()" class="mt-4 bg-red-500 text-white px-4 py-2 rounded">Logout</button>
    </div>
    <script>
        const client = window.supabase.createClient('YOUR_URL', 'YOUR_KEY');
        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) window.location.href = "index.html";
            const { data: p } = await client.from('profiles').select('first_name').eq('id', user.id).single();
            document.getElementById('welcome').innerText = "Welcome, " + p.first_name;
        }
        function logout() { client.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
