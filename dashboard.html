<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-200 p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-900">InsureGPTE Portal</h1>
            <button onclick="logout()" class="text-red-600 font-medium">Logout</button>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto p-6 mt-6">
        <div class="bg-blue-900 p-8 rounded-3xl text-white shadow-lg mb-8">
            <h2 id="welcome" class="text-3xl font-bold">Welcome back!</h2>
            <p class="opacity-80">Here is your customized testing area.</p>
        </div>
        <div id="test-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU'); 
        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) window.location.href = "index.html";
            const { data: p } = await client.from('profiles').select('*').eq('id', user.id).single();
            document.getElementById('welcome').innerText = "Welcome, " + p.first_name;
            const subs = p.interested_business_areas || [];
            document.getElementById('test-list').innerHTML = subs.map(s => `
                <div class="bg-white p-6 rounded-2xl border shadow-sm text-center">
                    <h3 class="font-bold text-lg mb-4">${s} Course</h3>
                    <button onclick="alert('Starting test...')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Start Test</button>
                </div>
            `).join('');
        }
        function logout() { client.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
