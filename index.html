<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
    <title>InsureGPTE Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="login-view" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <h2 class="text-3xl font-extrabold text-blue-900 mb-2">Welcome Back</h2>
        <p class="text-slate-500 mb-8">Sign in to access your dashboard</p>
        <input id="login-email" type="email" placeholder="Email Address" class="w-full p-4 mb-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 mb-6 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        <button id="btn-login" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">Sign In</button>
        <p class="mt-6 text-center text-slate-600">Don't have an account? <button onclick="toggleView()" class="text-blue-600 font-bold hover:underline">Register Now</button></p>
    </div>

    <div id="reg-view" class="hidden w-full max-w-2xl bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
        <h2 class="text-3xl font-extrabold text-blue-900 mb-6">Create Account</h2>
        <form id="reg-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="fname" placeholder="First Name" class="p-4 border rounded-xl">
            <input id="lname" placeholder="Last Name" class="p-4 border rounded-xl">
            <input id="email" placeholder="Email Address" class="p-4 border rounded-xl md:col-span-2">
            <input id="pass" type="password" placeholder="Password" class="p-4 border rounded-xl md:col-span-2">
            <select id="prof" class="p-4 border rounded-xl md:col-span-2 bg-white"><option value="">Select Profession</option><option>Student</option><option>Working Professional</option></select>
            <input id="mobile" placeholder="Mobile Number" class="p-4 border rounded-xl md:col-span-2">
            <input id="bname" placeholder="Building Name" class="p-3 border rounded col-span-2">
            <input id="street" placeholder="Street Name" class="p-3 border rounded col-span-2">
            <input id="area" placeholder="Area" class="p-3 border rounded col-span-2">
            <input id="city" placeholder="City" class="p-4 border rounded-xl">
            <input id="pin" placeholder="PIN Code" class="p-4 border rounded-xl">
            <input id="country" placeholder="Country *" class="p-3 border rounded col-span-2">
            <div class="md:col-span-2 mt-4"><label class="font-bold text-slate-700 block mb-3">Interested Areas of Subject:</label><div id="subject-list" class="grid grid-cols-2 gap-3 text-sm"></div></div>
        </form>
        <button id="btn-register" onclick="handleRegister()" class="w-full mt-8 bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition">Complete Registration</button>
        <button onclick="toggleView()" class="w-full mt-4 text-slate-400 hover:text-slate-600">Back to Login</button>
    </div>

    <script>
// REPLACE 'YOUR_SUPABASE_URL' and 'YOUR_SUPABASE_KEY' with your actual values
      
const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU',);
        async function loadSubjects() 
        {
            const { data } = await client.from('subjects').select('code, title');
            document.getElementById('subject-list').innerHTML = data.map(s => `<label class="flex items-center gap-2 p-3 border rounded-lg hover:bg-slate-50 cursor-pointer">	<input type="checkbox" value="${s.code}"> ${s.title}</label>`).join('');
        }
        loadSubjects();
        function toggleView() { document.getElementById('login-view').classList.toggle('hidden'); document.getElementById('reg-view').classList.toggle('hidden'); }

async function handleRegister() 
{
    // 1. Properly define the button variable FIRST
    const btn = document.getElementById('btn-register');
    
    // 2. Add a safety check to make sure the button exists
    if (!btn) {
        console.error("Button element 'btn-register' not found!");
        return;
    }

    btn.disabled = true; 
    btn.innerText = "Processing...";

    try {
        const emailVal = document.getElementById('email').value;
        const passVal = document.getElementById('pass').value;

        // 3. Perform Sign Up
        const { data: auth, error: authErr } = await client.auth.signUp({ 
            email: emailVal, 
            password: passVal 
        });

        if (authErr) throw authErr;

        // 4. Perform Profile Save
        const { error: rpcErr } = await client.rpc('save_user_profile', {
            user_id: auth.user.id,
            fname: document.getElementById('fname').value,
            lname: document.getElementById('lname').value,
            mob: document.getElementById('mobile').value,
            prof: document.getElementById('prof').value,
            bldg: document.getElementById('bldg').value,
            st: document.getElementById('street').value,
            ar: document.getElementById('area').value,
            ct: document.getElementById('city').value,
            pin: document.getElementById('pin').value,
            cnt: document.getElementById('country').value,
            subjects: Array.from(document.querySelectorAll('#subject-list input:checked')).map(cb => cb.value)
        });

        if (rpcErr) throw rpcErr;

        alert("Registration Successful!");
        toggleView(); // Go back to login

    } catch (err) {
        console.error("Error occurred:", err);
        alert("Error: " + (err.message || "An unexpected error occurred"));
    } finally {
        // 5. Always re-enable the button
        btn.disabled = false;
        btn.innerText = "Complete Registration";
    }
}
        async function handleLogin() {
            const { error } = await client.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value });
            if (error) alert("Login Failed: " + error.message);
            else window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
