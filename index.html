<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE | Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Supabase once -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-emerald-50 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-emerald-800">InsureGPTE Practice Quiz</h1>
        
        <div class="mb-6 flex gap-4">
            <button id="btn-ic01" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">IC-01</button>
            <button id="btn-ic11" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">IC-11</button>
        </div>

        <div id="quiz-container" class="mt-4">
            <p id="q-text" class="text-xl mb-4 font-semibold text-emerald-900">Select a subject to begin.</p>
            <div id="options-container" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <script>
        // Initialize client only once
        const supabase = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'sb_publishable_Qsbm4vkrTICfV59_H_rW-w_NyEm9O-r');

        async function loadQuestion(subjectCode) {
            const container = document.getElementById('options-container');
            const qText = document.getElementById('q-text');
            container.innerHTML = 'Loading...';
            
            try {
                const { data: subject } = await supabase.from('subjects').select('id').eq('code', subjectCode).single();
                if (!subject) throw new Error("Subject not found");

                const { data, error } = await supabase.from('questions').select('*').eq('subject_id', subject.id).limit(1);
                if (error) throw error;

                if (data && data.length > 0) {
                    qText.innerText = data[0].question_text;
                    container.innerHTML = '';
                    const btn = document.createElement('button');
                    btn.className = "bg-emerald-100 p-3 rounded text-left hover:bg-emerald-200 border border-emerald-300";
                    btn.innerText = "Show Answer";
                    btn.onclick = () => alert("Explanation: " + data[0].explanation);
                    container.appendChild(btn);
                } else {
                    qText.innerText = "No questions found.";
                }
            } catch (err) {
                qText.innerText = "Error: " + err.message;
            }
        }

        // Attach listeners after DOM loads
        document.getElementById('btn-ic01').addEventListener('click', () => loadQuestion('IC01'));
        document.getElementById('btn-ic11').addEventListener('click', () => loadQuestion('IC11'));
    </script>
</body>
</html>
