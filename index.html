                     </div>
                     <div class="feedback mt-3 font-semibold hidden"></div>`;
    
    // New function to handle the logic
    function checkAnswer(btn, correct, explanation) {
        const parent = btn.parentElement.parentElement;
        const feedback = parent.querySelector('.feedback');
        const isCorrect = (btn.innerText === correct);
        
        feedback.innerText = isCorrect ? "Correct! " + explanation : "Incorrect. The answer is: " + correct + ". " + explanation;
        feedback.className = "feedback mt-3 font-semibold " + (isCorrect ? "text-green-700" : "text-red-700");
        feedback.classList.remove('hidden');
    }
