<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <div id="auth-screen" class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 max-w-md mx-auto mt-20">
            <h1 class="text-3xl font-extrabold text-emerald-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500 mb-8">Access your personalized training modules.</p>
            <input id="email" type="email" placeholder="Email address" class="w-full p-4 mb-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg">Sign In / Register</button>
        </div>

        <div id="main-screen" class="hidden">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-bold text-slate-900">Training Dashboard</h2>
                    <p class="text-slate-500">Select a module to begin.</p>
                </div>
                <button onclick="logout()" class="px-4 py-2 text-sm text-slate-400 hover:text-red-600 transition">Logout</button>
            </header>
            <div id="subject-menu" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <div id="quiz-area" class="mt-10"></div>
        </div>
    </div>

    <script>

        // Check if user is already logged in on load
        client.auth.onAuthStateChange((event, session) => {
            if (session) {
                showDashboard();
            }
        });

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn');
            btn.innerText = "Processing...";

            const { data, error } = await client.auth.signInWithPassword({ email, password });
            
            if (error) {
                // If login fails, try signing up
                const { error: signUpError } = await client.auth.signUp({ email, password });
                if (signUpError) {
                    alert(signUpError.message);
                    btn.innerText = "Sign In / Register";
                } else {
                    alert("Account created. Please check your email if verification is required or log in.");
                    btn.innerText = "Sign In / Register";
                }
            } else {
                showDashboard();
            }
        }

        async function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            const { data, error } = await client.from('subjects').select('*');
            if (error) return console.error(error);
            
            document.getElementById('subject-menu').innerHTML = data.map(s => `
                <button onclick="loadQuiz(${s.id})" class="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-emerald-200 transition-all text-center">
                    <span class="text-xl font-bold text-slate-800">${s.code}</span>
                </button>
            `).join('');
        }

        function logout() { client.auth.signOut(); location.reload(); }
    </script>
