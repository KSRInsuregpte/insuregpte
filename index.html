      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsureGPTE | Professional Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <div id="auth-screen" class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 max-w-md mx-auto mt-20">
            <h1 class="text-3xl font-extrabold text-emerald-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500 mb-8">Access your personalized insurance training modules.</p>
            <input id="email" type="email" placeholder="Email address" class="w-full p-4 mb-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg hover:shadow-emerald-200">Sign In</button>
        </div>

        <div id="main-screen" class="hidden">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-bold text-slate-900">Training Dashboard</h2>
                    <p class="text-slate-500">Select a module to begin your assessment.</p>
                </div>
                <button onclick="logout()" class="px-4 py-2 text-sm text-slate-400 hover:text-red-600 transition">Logout</button>
            </header>
            
            <div id="subject-menu" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <p>Loading modules...</p>
            </div>
            
            <div id="quiz-area" class="space-y-6"></div>
        </div>
    </div>

    <script>
         const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');
   
        let currentQuestions = [];
        let activeSubjectId = null;

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpError } = await client.auth.signUp({ email, password });
                if (signUpError) return alert(signUpError.message);
                alert("Account created! Please log in.");
            } else {
                showDashboard();
            }
        }

        async function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            const { data } = await client.from('subjects').select('*');
            document.getElementById('subject-menu').innerHTML = data.map(s => `
                <button onclick="loadQuiz(${s.id})" class="group flex flex-col items-center justify-center p-6 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-emerald-200 transition-all duration-300">
                    <div class="w-12 h-12 mb-4 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    </div>
                    <span class="text-lg font-bold text-slate-800">${s.code}</span>
                </button>
            `).join('');
        }

        async function loadQuiz(sid) {
            activeSubjectId = sid;
            const { data } = await client.from('questions').select('*').eq('subject_id', sid).order('random()').limit(50);
            currentQuestions = data;
            document.getElementById('quiz-area').innerHTML = `
                <button onclick="showDashboard()" class="text-emerald-700 font-bold mb-4">← Back to Dashboard</button>
                <div id="questions-list">${data.map((q, i) => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6 q-container" data-id="${q.id}">
                        <p class="font-bold text-slate-700 mb-4">${i+1}. ${q.question_text}</p>
                        <div class="space-y-3">
                            ${['a','b','c','d'].map(o => `
                                <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-emerald-500 hover:bg-emerald-50 transition">
                                    <input type="radio" name="q${q.id}" value="${q['option_'+o]}" class="mr-3 accent-emerald-600"> 
                                    ${q['option_'+o]}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `).join('')}</div>
                <button onclick="submitQuiz()" class="w-full bg-emerald-900 text-white py-5 rounded-2xl font-bold text-lg hover:bg-emerald-800 transition shadow-xl">Submit Assessment</button>
            `;
            window.scrollTo(0, 0);
        }

        async function submitQuiz() {
            let score = 0;
            currentQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                const container = document.querySelector(`.q-container[data-id="${q.id}"]`);
                if (selected && selected.value.trim() === q.correct_option.trim()) {
                    score++;
                    container.classList.add('border-green-500', 'bg-green-50');
                } else {
                    container.classList.add('border-red-500', 'bg-red-50');
                    container.innerHTML += `<div class="mt-4 p-3 bg-red-100 rounded-lg text-red-800 text-sm font-medium">Correct: ${q.correct_option}<br><span class="font-normal italic">${q.explanation}</span></div>`;
                }
            });
            await client.from('attempts').insert([{ subject_id: activeSubjectId, score: score, total_questions: currentQuestions.length }]);
            alert(`Test Complete! You scored ${score} out of ${currentQuestions.length}`);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
