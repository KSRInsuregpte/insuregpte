<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE | Professional Quiz Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="app" class="max-w-3xl mx-auto p-4 md:p-8">
        <div id="auth-screen" class="bg-white p-10 rounded-2xl shadow-xl border border-slate-100 max-w-md mx-auto mt-20">
            <h1 class="text-3xl font-extrabold text-emerald-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500 mb-8">Access your personalized insurance training modules.</p>
            <input id="email" type="email" placeholder="Email address" class="w-full p-4 mb-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="handleAuth()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg hover:shadow-emerald-200">Sign In</button>
        </div>
        
        </div>
    <script>
         const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');
        let currentQuestions = [];
        let activeSubjectId = null;

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpError } = await client.auth.signUp({ email, password });
                if (signUpError) return alert(signUpError.message);
                alert("Account created! Please login.");
            } else {
                showDashboard();
            }
        }

        async function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            const { data } = await client.from('subjects').select('*');
            document.getElementById('subject-menu').innerHTML = data.map(s => `
                <button onclick="loadQuiz(${s.id})" class="bg-emerald-600 text-white p-4 rounded-lg hover:bg-emerald-700 font-semibold">${s.code}</button>
            `).join('');
        }

        async function loadQuiz(sid) {
            activeSubjectId = sid;
            const { data } = await client.from('questions').select('*').eq('subject_id', sid).order('random()').limit(50);
            currentQuestions = data;
            document.getElementById('quiz-area').innerHTML = `
                <div id="questions-list">${data.map((q, i) => `
                    <div class="mb-8 p-4 border-b q-container" data-id="${q.id}">
                        <p class="font-bold mb-3">${i+1}. ${q.question_text}</p>
                        ${['a','b','c','d'].map(o => `
                            <label class="block mb-2 cursor-pointer p-2 hover:bg-gray-50 rounded">
                                <input type="radio" name="q${q.id}" value="${q['option_'+o]}"> ${q['option_'+o]}
                            </label>
                        `).join('')}
                    </div>
                `).join('')}</div>
                <button onclick="submitQuiz()" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg">Submit Test</button>
            `;
        }

        async function submitQuiz() {
            let score = 0;
            const user = client.auth.getUser();
            
            currentQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                const container = document.querySelector(`.q-container[data-id="${q.id}"]`);
                if (selected && selected.value.trim() === q.correct_option.trim()) {
                    score++;
                } else {
                    container.classList.add('bg-red-50'); // Highlight incorrect
                    container.innerHTML += `<p class="text-red-600 font-bold mt-2">Correct: ${q.correct_option}</p><p class="text-sm italic">${q.explanation}</p>`;
                }
            });

            await client.from('attempts').insert([{ subject_id: activeSubjectId, score: score, total_questions: currentQuestions.length }]);
            alert(`Test Complete! You scored ${score} out of ${currentQuestions.length}`);
            window.scrollTo(0, 0);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
