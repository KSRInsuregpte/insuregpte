<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE - Message</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="view-login" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-2">InsureGPTE - Message</h1>
            <input id="login-email" type="email" placeholder="Email" class="w-full p-4 mb-4 border rounded-xl">
            <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 mb-6 border rounded-xl">
            <button id="btn-login" onclick="loginUser()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold mb-4">Sign In</button>
            <button onclick="showView('register')" class="text-slate-500 underline text-sm">New user? Register here</button>
        </div>
    </div>

    <div id="view-register" class="hidden max-w-2xl mx-auto p-10 bg-white shadow-xl rounded-3xl mt-10">
        <h2 class="text-2xl font-bold mb-6">Registration Details</h2>
        <div class="grid grid-cols-2 gap-4">
            <input id="reg-fname" placeholder="First Name" class="p-4 border rounded-xl">
            <input id="reg-lname" placeholder="Last Name" class="p-4 border rounded-xl">
            <input id="reg-email" placeholder="Email" class="p-4 border rounded-xl col-span-2">
            <input id="reg-pass" type="password" placeholder="Password" class="p-4 border rounded-xl col-span-2">
            <input id="reg-mobile" placeholder="Mobile" class="p-4 border rounded-xl col-span-2">
            <input id="reg-company" placeholder="Company Name" class="p-4 border rounded-xl col-span-2">
            <textarea id="reg-address" placeholder="Address" class="p-4 border rounded-xl col-span-2"></textarea>
        </div>
        <button id="btn-reg" onclick="registerUser()" class="w-full mt-6 bg-emerald-600 text-white py-4 rounded-xl font-bold">Register & Submit</button>
        <button onclick="showView('login')" class="w-full mt-4 text-slate-500 text-sm">Back to Login</button>
    </div>

    <div id="view-admin" class="hidden max-w-5xl mx-auto p-10 bg-white shadow-xl rounded-3xl mt-10">
        <h2 class="text-2xl font-bold mb-6">Admin Approval Console</h2>
        <table class="w-full text-left">
            <thead><tr class="border-b"><th>Name</th><th>Email</th><th>Company</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="admin-table-body"></tbody>
        </table>
        <button onclick="showView('login')" class="mt-6 text-slate-500 underline">Back</button>
    </div>

    <script>
         
        const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');

        function showView(view) {
            ['login', 'register', 'admin'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+view).classList.remove('hidden');
        }

       async function loginUser() {
    const btn = document.getElementById('btn-login');
    btn.innerText = "Signing in...";
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;

    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) { alert(error.message); btn.innerText = "Sign In"; return; }

    // Fetch the profile
    const { data: profile, error: pError } = await client
        .from('profiles')
        .select('status, role')
        .eq('id', data.user.id)
        .single();
    
    // Log the error to console if the profile wasn't found
    if (pError || !profile) {
        console.error("Profile fetch error:", pError);
        alert("Account exists, but your profile record is missing. Please contact admin.");
        client.auth.signOut();
        btn.innerText = "Sign In";
        return;
    }

    if (profile.role === 'admin') {
        loadAdmin();
        showView('admin');
    } else if (profile.status === 'approved') {
        alert("Login Successful!");
        // Trigger dashboard
    } else {
        alert("Your account status is: " + profile.status + ". Please wait for approval.");
        client.auth.signOut();
        btn.innerText = "Sign In";
    }
}

        async function registerUser() {
    const btn = document.getElementById('btn-reg');
    btn.innerText = "Processing...";
    
    try {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-pass').value;
        
        // 1. Sign up
        const { data, error: authError } = await client.auth.signUp({ email, password });
        if (authError) throw authError;

        // 2. Update profile (the trigger already created the row!)
        const { error: updateError } = await client
            .from('profiles')
            .update({
                first_name: document.getElementById('reg-fname').value,
                last_name: document.getElementById('reg-lname').value,
                mobile: document.getElementById('reg-mobile').value,
                company_name: document.getElementById('reg-company').value,
                address: document.getElementById('reg-address').value
            })
            .eq('id', data.user.id);
            
        if (updateError) throw updateError;
        
        alert("Registration successful! Admin will verify your profile.");
        showView('login');
    } catch (err) { 
        alert("Registration Error: " + err.message); 
        btn.innerText = "Register & Submit"; 
    }
}

        async function loadAdmin() {
            const { data: profiles } = await client.from('profiles').select('*');
            document.getElementById('admin-table-body').innerHTML = profiles.map(p => `
                <tr class="border-b">
                    <td>${p.first_name} ${p.last_name}</td>
                    <td>${p.mobile}</td>
                    <td>${p.company_name}</td>
                    <td>${p.status}</td>
                    <td><button onclick="approveUser('${p.id}')" class="bg-blue-500 text-white px-2 rounded">Approve</button></td>
                </tr>
            `).join('');
        }

        async function approveUser(uid) {
            await client.from('profiles').update({ status: 'approved' }).eq('id', uid);
            alert("User Approved!");
            loadAdmin();
        }
    </script>
</body>
</html>
