<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE | Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-emerald-50 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-emerald-800">InsureGPTE Practice Quiz</h1>
        
        <div id="subject-menu" class="mb-6 flex flex-wrap gap-2">
            <p>Loading subjects...</p>
        </div>

        <div id="quiz-container" class="mt-4">
            <p id="q-text" class="text-xl mb-4 font-semibold text-emerald-900">Select a subject to begin.</p>
            <div id="options-container" class="space-y-6"></div>
        </div>
    </div>

    <script>
           const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');

       // Automatically fetch subjects on load
        async function fetchSubjects() {
            const menu = document.getElementById('subject-menu');
            const { data, error } = await client.from('subjects').select('*').order('id');
            
            if (error) { menu.innerHTML = "Error loading subjects."; return; }

            menu.innerHTML = '';
            data.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = "bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700 transition";
                btn.innerText = sub.code;
                btn.onclick = () => loadAllQuestions(sub.id, sub.code);
                menu.appendChild(btn);
            });
        }

        async function loadAllQuestions(subjectId, subjectCode) {
            const container = document.getElementById('options-container');
            const qText = document.getElementById('q-text');
            container.innerHTML = 'Shuffling 50 random questions...';
            qText.innerText = "Questions for " + subjectCode;

            try {
                const { data, error } = await client.from('questions').select('*').eq('subject_id', subjectId);
                if (error) throw error;

                // Shuffle and pick 50
                const shuffled = data.sort(() => 0.5 - Math.random()).slice(0, 50);
                
                container.innerHTML = '';
                shuffled.forEach((q, idx) => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-white border rounded shadow-sm";
                    div.innerHTML = `
                        <p class="font-bold mb-3">${idx + 1}. ${q.question_text}</p>
                        <div class="space-y-2">
                            ${['a','b','c','d'].map(opt => `
                                <label class="flex items-center space-x-3 p-2 border rounded cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="q${q.id}" value="${q['option_'+opt] || ''}" onclick="freeze(this, '${q.correct_option.replace(/'/g, "\\'")}', '${q.explanation.replace(/'/g, "\\'")}')">
                                    <span>${q['option_'+opt] || 'Option not set'}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div class="feedback mt-3 hidden p-3 rounded font-semibold"></div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = "Error loading questions.";
            }
        }

       function freeze(selectedRadio, correct, explanation) {
            const parentDiv = selectedRadio.closest('div.p-4');
            const feedback = parentDiv.querySelector('.feedback');
            parentDiv.querySelectorAll('input').forEach(r => r.disabled = true);
            
            // Fix: We assume the database has the actual ANSWER TEXT in correct_option.
            // If you have mixed data (sometimes text, sometimes C/A/B/D), 
            // the quiz will always have this problem.
            
            const isCorrect = (selectedRadio.value.trim() === correct.trim());
            
            feedback.innerHTML = (isCorrect ? 
                `<p class='text-green-800 font-bold'>Correct!</p>` : 
                `<p class='text-red-800 font-bold'>Incorrect.</p><p>Correct Answer: ${correct}</p>`) + 
                `<p class='mt-1 font-normal'>${explanation}</p>`;
            feedback.className = "feedback mt-3 p-3 rounded " + (isCorrect ? "bg-green-100" : "bg-red-100");
            feedback.classList.remove('hidden');
        }
    
        }

        fetchSubjects(); // Call this when page loads
    </script>
</body>
</html>
