<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE | Secure Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .quiz-card { max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="view-auth" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md text-center">
            <h1 class="text-3xl font-extrabold text-emerald-900 mb-2">InsureGPTE</h1>
            <p class="text-slate-500 mb-8">Secure Assessment Portal</p>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 border border-slate-200 rounded-xl">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 border border-slate-200 rounded-xl">
            <button onclick="handleAuth()" id="btn-auth" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold">Sign In</button>
        </div>
    </div>

    <div id="view-main" class="hidden min-h-screen p-6">
        <div class="max-w-4xl mx-auto">
            <div id="dashboard-header" class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Training Dashboard</h2>
                <button onclick="logout()" class="text-slate-400 hover:text-red-600">Logout</button>
            </div>
            <div id="subject-menu" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
            <div id="quiz-area" class="quiz-card"></div>
        </div>
    </div>

    <script>
                const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');
        // View Management: Only shows what should be seen
        function setView(view) {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
        }

        client.auth.onAuthStateChange((event, session) => {
            if (session) setView('main');
            else setView('auth');
        });

        async function loadQuiz(sid) {
            // Clear dashboard header
            document.getElementById('dashboard-header').classList.add('hidden');
            document.getElementById('subject-menu').classList.add('hidden');
            
            const { data } = await client.from('questions').select('*').eq('subject_id', sid).order('random()').limit(50);
            
            document.getElementById('quiz-area').innerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    ${data.map((q, i) => `
                        <div class="mb-8 q-container" data-id="${q.id}">
                            <p class="font-bold mb-4">${i+1}. ${q.question_text}</p>
                            <div class="space-y-3">
                                ${['a','b','c','d'].map(o => `
                                    <label class="block p-4 border rounded-xl hover:border-emerald-500 cursor-pointer">
                                        <input type="radio" name="q${q.id}" value="${q['option_'+o]}" class="mr-2"> ${q['option_'+o]}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="submitQuiz()" class="w-full bg-emerald-900 text-white py-4 rounded-xl font-bold">Submit Assessment</button>
                </div>
            `;
        }
    </script>
</body>
</html>
