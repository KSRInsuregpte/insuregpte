<body class="bg-gray-50 min-h-screen">

    <div id="view-login" class="max-w-sm mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-700">InsureGPTE Login</h1>
        <input id="in-email" type="email" placeholder="Email" class="w-full p-3 mb-4 border rounded">
        <input id="in-pass" type="password" placeholder="Password" class="w-full p-3 mb-6 border rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Sign In</button>
        <p class="mt-4 text-center text-sm">New user? <button onclick="show('reg')" class="text-blue-600 underline">Register here</button></p>
    </div>

    <div id="view-reg" class="hidden max-w-2xl mx-auto my-10 p-8 bg-white rounded-2xl shadow-xl">
        <h2 class="text-xl font-bold mb-6">User Registration</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2 relative">
                <input id="reg-pass" type="password" placeholder="Password" class="w-full p-3 border rounded pr-10">
                <button onclick="toggleModal(true)" class="absolute right-3 top-3 w-6 h-6 flex items-center justify-center rounded-full border-2 border-blue-600 text-blue-600 font-bold">i</button>
            </div>
            <input id="fname" placeholder="First Name" class="p-3 border rounded">
            <input id="lname" placeholder="Last Name" class="p-3 border rounded">
            </div>
        <button onclick="register()" class="w-full mt-6 bg-green-600 text-white py-3 rounded font-bold">Register</button>
        <button onclick="show('login')" class="w-full mt-4 text-gray-500 underline">Back to Login</button>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg max-w-sm">
            <h3 class="font-bold mb-2">Password Policy</h3>
            <p class="text-sm text-gray-600 mb-4">Min 8-15 chars, 1 Capital, 1 Number, Special: $, @, #, &</p>
            <button onclick="toggleModal(false)" class="w-full bg-gray-200 py-2 rounded">Close</button>
        </div>
    </div>
