<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsureGPTE | Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-emerald-50 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-emerald-800">InsureGPTE Practice Quiz</h1>
        
        <div class="mb-6 flex gap-4">
            <button id="btn-ic01" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">IC-01</button>
            <button id="btn-ic11" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">IC-11</button>
        </div>

        <div id="quiz-container" class="mt-4">
            <p id="q-text" class="text-xl mb-4 font-semibold text-emerald-900">Select a subject to see all questions.</p>
            <div id="options-container" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const client = window.supabase.createClient('https://tvjsivuibvzybdbjtesq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anNpdnVpYnZ6eWJkYmp0ZXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTI1MjksImV4cCI6MjA5ODk4ODUyOX0.meGmoVDJE25neU_na5xl8u3CYxA24M7tqcG5ez-emaU');

        async function loadAllQuestions(subjectCode) {
            const container = document.getElementById('options-container');
            const qText = document.getElementById('q-text');
            container.innerHTML = 'Loading all questions...';
            qText.innerText = "Questions for " + subjectCode;

            try {
                const { data: subject } = await client.from('subjects').select('id').eq('code', subjectCode).single();
                if (!subject) throw new Error("Subject not found");

                // Removed .limit(1) to fetch everything
                const { data, error } = await client.from('questions').select('*').eq('subject_id', subject.id);
                if (error) throw error;

                container.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach((q, index) => {
                        const div = document.createElement('div');
                        div.className = "p-4 bg-emerald-50 rounded border border-emerald-200";
                        div.innerHTML = `<p class="font-bold">${index + 1}. ${q.question_text}</p>
                                         <button class="mt-2 text-emerald-700 font-semibold underline" onclick="alert('${q.explanation.replace(/'/g, "\\'")}')">Show Answer</button>`;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = "No questions found.";
                }
            } catch (err) {
                container.innerHTML = "Error: " + err.message;
            }
        }

        document.getElementById('btn-ic01').addEventListener('click', () => loadAllQuestions('IC01'));
        document.getElementById('btn-ic11').addEventListener('click', () => loadAllQuestions('IC11'));
    </script>
</body>
</html>
